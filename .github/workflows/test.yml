name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latestname: Smart Contracts CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout репозитория
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Foundry
      - name: Install Foundry
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          source ~/.bashrc
          foundryup

      # 3. Проверка версии
      - name: Check Foundry version
        run: forge --version

      # 4. Установка зависимостей (если есть lib/)
      - name: Install dependencies
        run: forge install

      # 5. Компиляция контрактов
      - name: Build contracts
        run: forge build --sizes

      # 6. Запуск тестов + gas report
      - name: Run tests
        run: forge test --gas-report -vvv

      # 7. Установка Python (для Slither)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 8. Установка Slither
      - name: Install Slither
        run: |
          pip install slither-analyzer

      # 9. Запуск Slither анализа
      - name: Run Slither
        run: slither .
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
