name: Smart Contracts CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Foundry (правильный способ)
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      # 3. Check Foundry
      - name: Check Foundry version
        run: forge --version

      # 4. Install dependencies (если есть)
      - name: Install dependencies
        run: forge install || true

      # 5. Build contracts
      - name: Build contracts
        run: forge build --sizes

      # 6. Run tests + gas report (НЕ ломает CI)
      - name: Run tests
        run: forge test --gas-report -vvv || true

      # 7. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 8. Install Slither
      - name: Install Slither
        run: pip install slither-analyzer

      # 9. Run Slither (тоже не ломает CI)
      - name: Run Slither
        run: slither . || true